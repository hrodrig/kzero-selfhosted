# Docs-only release: annotated tag v* on main → GitHub Release from CHANGELOG.
# Merge develop → main, bump VERSION + CHANGELOG + README badge, then:
#   git tag -a v0.1.7 -m "Release 0.1.7" && git push origin v0.1.7

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish or refresh (e.g. v0.1.6)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then
            echo "::error::Could not resolve release tag"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing release for $TAG"

      - name: Validate VERSION and docs
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          chmod +x testing/scripts/release-check.sh testing/scripts/extract-changelog.sh
          testing/scripts/release-check.sh

      - name: Build release notes
        run: |
          VER="${{ steps.tag.outputs.tag }}"
          VER="${VER#v}"
          {
            testing/scripts/extract-changelog.sh "$VER"
            echo ""
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.tag }}/CHANGELOG.md) for full history."
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          TITLE="${TAG#v}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — updating title and notes."
            gh release edit "$TAG" --title "$TITLE" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "$TITLE" --notes-file release-notes.md --verify-tag
          fi
