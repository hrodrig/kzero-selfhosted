# Synthetic targets for the in-cluster smoke pipeline (two namespaces).
# Names must match run/in-cluster/kzero-smoke.sample.yml step refs.
---
apiVersion: v1
kind: Namespace
metadata:
  name: kzero-smoke-a
  labels:
    app.kubernetes.io/part-of: kzero-in-cluster-smoke
---
apiVersion: v1
kind: Namespace
metadata:
  name: kzero-smoke-b
  labels:
    app.kubernetes.io/part-of: kzero-in-cluster-smoke
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: kzero-smoke-a
  labels:
    app.kubernetes.io/name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: kzero-smoke-b
  labels:
    app.kubernetes.io/name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
