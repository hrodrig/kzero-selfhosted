apiVersion: batch/v1
kind: Job
metadata:
  name: kzero-analyze
  namespace: kzero-system
  labels:
    app.kubernetes.io/name: kzero
    app.kubernetes.io/component: in-cluster-smoke
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kzero
        app.kubernetes.io/component: in-cluster-smoke
    spec:
      serviceAccountName: kzero
      restartPolicy: Never
      containers:
        - name: kzero
          image: ghcr.io/hrodrig/kzero:v1.0.1
          imagePullPolicy: IfNotPresent
          args:
            - analyze
            - --config
            - /config/kzero.yaml
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: kzero-smoke
