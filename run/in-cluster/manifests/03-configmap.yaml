# Source of truth for edits: ../kzero-smoke.sample.yml
# Refresh: kubectl create configmap kzero-smoke --from-file=kzero.yaml=../kzero-smoke.sample.yml -n kzero-system --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: ConfigMap
metadata:
  name: kzero-smoke
  namespace: kzero-system
  labels:
    app.kubernetes.io/name: kzero
    app.kubernetes.io/component: in-cluster-smoke
data:
  kzero.yaml: |
    schema_version: "1.0"
    cluster:
      name: "in-cluster-smoke"
      environment: "smoke"
      description: "Two-namespace native scale smoke (no release.*, no hooks)"
    client:
      id: "kzero-in-cluster-smoke"
    pipelines:
      down:
        - deployment.kzero-smoke-a/app
        - deployment.kzero-smoke-b/app
      up:
        - deployment.kzero-smoke-a/app:
            replicas: 1
            wait_for_ready: true
            timeout: 3m
        - deployment.kzero-smoke-b/app:
            replicas: 1
            wait_for_ready: true
            timeout: 3m
    retry:
      attempts: 2
      delay: 5s
    run:
      mode: "live"
      execution: "native"
      kubeconfig: ""
      timeout: 15m
      operation_timeout: 5m
