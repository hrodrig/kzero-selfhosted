schema_version: "1.0"
# Minimal sample for docs — workload refs only, dry-run (no kubectl calls during analyze).
# Omitting run.execution defaults to native on kzero v1.0.0+ (explicit shell/auto if needed).
pipelines:
  down:
    - deployment.demo/app
  up:
    - deployment.demo/app
retry:
  attempts: 3
  delay: 1s
run:
  mode: "dry-run"
  timeout: 10m
  operation_timeout: 30s
