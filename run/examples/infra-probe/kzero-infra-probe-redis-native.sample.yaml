# Infra probe: native / in-cluster (Helm SDK — no probe-redis.sh in distroless image).
# Copy probe-redis.yaml + kzero-probe-redis-values.yaml into helm.workspace.

schema_version: "1.0"

helm:
  workspace: "./helm-assets"

infra_probe:
  enabled: false
  before: ["reset", "down"]
  fail_fast: true
  cache_ttl: 30m
  pipeline:
    up:
      - release.probe-ns/probe-redis
    down:
      - release.probe-ns/probe-redis
  checks:
    - pvc_bound: probe-ns/redis-data-probe-redis-master-0
    - release_ready: true

run:
  mode: dry-run
  execution: native
  kubeconfig: ""
  probe_cache_dir: ""
