# Platform reset example — large maintenance profile (namespace platform).
#
#   cp env.example .env && edit KUBECONFIG
#   ./run-kzero analyze
#   ./run-kzero --live reset   # lab/staging only — type YES
#
# Assumes workloads already exist in namespace platform (Deployments/StatefulSets
# managed outside this profile or from a prior install). Helm steps reinstall infra.
# See README.md and run/docs/transcripts/reset-live-transcript-platform.anonymized.md.

schema_version: "1.0"

cluster:
  name: "platform-lab"
  environment: "lab"
  description: "YAML metadata only — target cluster comes from kubeconfig"

helm:
  workspace: "helm"

client:
  id: "platform-reset-lab-v1"

command:
  kubectl: "kubectl"
  helm: "helm"

hooks:
  pre-down: ""
  post-down: ""
  pre-up: ""
  post-up: ""
  on-error: ""

notify:
  slack:
    enabled: false
    webhook_url: ""
  discord:
    enabled: false
    webhook_url: ""

pipelines:
  down:
    - statefulset.platform/worker-alpha-slave
    - statefulset.platform/worker-beta-slave
    - deployment.platform/worker-alpha-dashboard
    - deployment.platform/worker-beta-dashboard
    - deployment.platform/worker-beta
    - statefulset.platform/orchestrator-slave
    - statefulset.platform/worker-gamma-slave
    - statefulset.platform/notifier-slave
    - deployment.platform/frontend
    - deployment.platform/auth
    - deployment.platform/completion
    - deployment.platform/config
    - deployment.platform/orchestrator
    - deployment.platform/orchestrator-dashboard
    - deployment.platform/worker-gamma-dashboard
    - deployment.platform/worker-gamma
    - deployment.platform/notifier
    - deployment.platform/cache-eviction
    - deployment.platform/log-collector
    - deployment.platform/status
    - deployment.platform/vault-helper
    - deployment.platform/notifier-dashboard
    - custom: ./hooks/truncate-job-queue.sh
    - release.platform/jobstore-notifier
    - release.platform/jobstore-orchestrator
    - release.platform/jobstore-gamma
    - release.platform/jobstore-beta
    - release.platform/jobstore-alpha
    - release.platform/redis-cache
    - release.platform/rabbitmq
    - release.platform/postgresql
    - pvc.platform/data-jobstore-alpha-0
    - pvc.platform/data-platform-postgresql-0
    - pvc.platform/data-jobstore-beta-0
    - pvc.platform/data-jobstore-gamma-0
    - pvc.platform/data-jobstore-orchestrator-0
    - pvc.platform/data-rabbitmq-0
    - pvc.platform/redis-data-redis-cache-master-0
    - pvc.platform/data-jobstore-notifier-0

  up:
    - release.platform/postgresql
    - release.platform/rabbitmq
    - release.platform/jobstore-alpha
    - release.platform/jobstore-beta
    - release.platform/jobstore-gamma
    - release.platform/jobstore-orchestrator:
        post: ./hooks/wait-helm-release-ready.sh
    - release.platform/jobstore-notifier
    - release.platform/redis-cache
    - deployment.platform/vault-helper:
        replicas: 1
    - deployment.platform/config:
        replicas: 1
    - deployment.platform/notifier:
        replicas: 1
    - deployment.platform/worker-gamma:
        replicas: 1
    - deployment.platform/worker-beta:
        replicas: 1
    - deployment.platform/cache-eviction:
        replicas: 1
    - deployment.platform/completion:
        replicas: 1
    - deployment.platform/status:
        replicas: 1
    - deployment.platform/worker-gamma-dashboard:
        replicas: 1
    - deployment.platform/auth:
        replicas: 1
    - deployment.platform/log-collector:
        replicas: 1
    - deployment.platform/notifier-dashboard:
        replicas: 1
    - deployment.platform/orchestrator:
        replicas: 1
        wait_for_ready: true
    - deployment.platform/orchestrator-dashboard:
        replicas: 1
    - statefulset.platform/worker-gamma-slave:
        pre: ./hooks/wait-master-ready.sh
        replicas: 4
    - statefulset.platform/notifier-slave:
        pre: ./hooks/wait-master-ready.sh
        replicas: 4
    - statefulset.platform/orchestrator-slave:
        pre: ./hooks/wait-master-ready.sh
        replicas: 4
    - deployment.platform/worker-beta-dashboard:
        replicas: 1
    - deployment.platform/worker-alpha-dashboard:
        replicas: 1
    - statefulset.platform/worker-alpha-slave:
        pre: ./hooks/wait-dashboard-ready.sh
        replicas: 4
    - statefulset.platform/worker-beta-slave:
        pre: ./hooks/wait-master-ready.sh
        replicas: 4
    - custom: ./hooks/rollout-restart-notifier.sh
    - deployment.platform/frontend:
        replicas: 3

infra_probe:
  enabled: false
  before: ["reset"]
  fail_fast: true
  cache_ttl: 15m
  pipeline:
    up:
      - release.platform/kzero-probe-redis
    down:
      - release.platform/kzero-probe-redis
  checks:
    - pvc_bound: platform/redis-data-kzero-probe-redis-master-0
    - release_ready: true

retry:
  attempts: 1
  delay: 5s

run:
  kubeconfig: ""
  mode: "dry-run"
  color: "always"
  execution: "native"
  probe_cache_dir: "./.probe-cache"
  timeout: 45m
  operation_timeout: 15m
