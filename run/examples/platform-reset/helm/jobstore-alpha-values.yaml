global:
  security:
    allowInsecureImages: true
image:
  registry: docker.io
  repository: bitnamilegacy/postgresql
fullnameOverride: jobstore-alpha
auth:
  postgresPassword: jobstore-alpha-pass
  database: jobstore_alpha
  username: demo
  password: jobstore-alpha-pass
primary:
  persistence:
    enabled: true
    size: 4Gi
    annotations:
      "helm.sh/resource-policy": delete
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 2048Mi
