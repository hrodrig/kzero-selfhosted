# Demo MySQL for WordPress — fixed passwords; lab namespace only.
global:
  security:
    allowInsecureImages: true
image:
  registry: docker.io
  repository: bitnamilegacy/mysql
fullnameOverride: demo-mysql
auth:
  rootPassword: demo-mysql-root
  database: wordpress
  username: wordpress
  password: demo-wp-pass
primary:
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
